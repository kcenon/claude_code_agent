# docker-compose.firewall.yml
# Phase 4: Firewall override with NET_ADMIN and NET_RAW — Generated by install.sh
# WARNING: NET_ADMIN and NET_RAW allow container to modify host network
# stack (iptables, ARP, routing). Only enable with explicit user consent.

services:
  claude-a:
    cap_add:
      - NET_ADMIN
      - NET_RAW

  claude-b:
    cap_add:
      - NET_ADMIN
      - NET_RAW

