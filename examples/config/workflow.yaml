# =============================================================================
# AD-SDLC Workflow Configuration
# =============================================================================
#
# This file configures the AD-SDLC pipeline, quality gates, and integrations.
# Place this file at: .ad-sdlc/config/workflow.yaml
#
# Schema: schemas/workflow.schema.json
# Generated by: ad-sdlc init --quick (standard template)
#
# Tip: Run with --local flag to skip GitHub integration and run everything
# locally. See the `local_mode` option below.
# =============================================================================

# Configuration schema version (semver format, required)
version: '1.0.0'

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
# Controls project-wide defaults for directories, logging, approvals, retries,
# and timeouts. All fields are optional and have sensible defaults.
global:
  # Project root directory. ${PWD} is resolved at runtime.
  project_root: '${PWD}'

  # Directory for inter-agent communication (scratchpad files)
  scratchpad_dir: '.ad-sdlc/scratchpad'

  # Output directory for generated documents (PRD, SRS, SDS)
  output_docs_dir: 'docs'

  # Logging level: DEBUG | INFO | WARN | ERROR
  log_level: 'INFO'

  # Approval mode for pipeline gates:
  #   auto     - no human approval needed
  #   manual   - every gate requires approval
  #   critical - only critical gates require approval
  #   custom   - use approval_gates map below
  approval_mode: 'auto'

  # Fine-grained approval gates (used when approval_mode is "custom")
  # approval_gates:
  #   after_collection: true
  #   after_prd: true
  #   after_srs: true
  #   after_sds: true
  #   after_issues: true
  #   before_merge: false

  # Retry policy for failed agent executions
  retry_policy:
    max_attempts: 3 # 1-10, how many times to retry
    backoff: 'exponential' # linear | exponential
    base_delay_seconds: 5 # initial delay between retries
    max_delay_seconds: 60 # cap on backoff delay

  # Timeout settings in seconds for each phase
  timeouts:
    document_generation: 300 # PRD/SRS/SDS generation (min: 60)
    issue_creation: 60 # GitHub issue creation (min: 30)
    implementation: 1800 # Code implementation (min: 300)
    pr_review: 300 # PR review phase (min: 60)

# -----------------------------------------------------------------------------
# Pipeline Configuration
# -----------------------------------------------------------------------------
# Defines the sequence of stages that run in order. Each stage maps to an
# agent and has an optional timeout.
#
# Two pipeline styles are supported:
#   1. Flat stages (shown below) - simple linear pipeline
#   2. Mode-based stages - different pipelines per mode (greenfield/enhancement/import)
pipeline:
  # Flat stages: executed in order from top to bottom
  stages:
    - name: 'collect'
      agent: 'collector'
      timeout_ms: 300000 # 5 minutes

    - name: 'prd'
      agent: 'prd-writer'
      timeout_ms: 300000

    - name: 'srs'
      agent: 'srs-writer'
      timeout_ms: 300000

    - name: 'sds'
      agent: 'sds-writer'
      timeout_ms: 300000

    - name: 'issues'
      agent: 'issue-generator'
      timeout_ms: 300000

    - name: 'implement'
      agent: 'controller'
      timeout_ms: 600000 # 10 minutes (implementation takes longer)
      parallel: true # enable parallel workers for this stage
      max_parallel: 3 # max concurrent worker agents

    - name: 'review'
      agent: 'pr-reviewer'
      timeout_ms: 300000

  # --- Mode-based pipeline (alternative to flat stages) ---
  # Uncomment to use different pipelines for different project modes.
  #
  # default_mode: "greenfield"
  # modes:
  #   greenfield:
  #     description: "Full pipeline for new projects"
  #     stages:
  #       - name: "collect"
  #         agent: "collector"
  #       - name: "prd"
  #         agent: "prd-writer"
  #       - name: "srs"
  #         agent: "srs-writer"
  #       - name: "sds"
  #         agent: "sds-writer"
  #       - name: "issues"
  #         agent: "issue-generator"
  #       - name: "implement"
  #         agent: "controller"
  #       - name: "review"
  #         agent: "pr-reviewer"
  #
  #   enhancement:
  #     description: "Shortened pipeline for existing codebases"
  #     stages:
  #       - name: "collect"
  #         agent: "collector"
  #       - name: "issues"
  #         agent: "issue-generator"
  #       - name: "implement"
  #         agent: "controller"
  #       - name: "review"
  #         agent: "pr-reviewer"

# -----------------------------------------------------------------------------
# Agent-Level Overrides (in workflow context)
# -----------------------------------------------------------------------------
# Per-agent settings that affect how agents behave within the workflow.
# These supplement the agent definitions in agents.yaml.
agents:
  controller:
    model: 'sonnet' # sonnet | opus | haiku
    tools:
      - 'Read'
      - 'Write'
      - 'Edit'
      - 'Bash'
      - 'Glob'
      - 'Grep'
    scheduling:
      algorithm: 'priority_dependency' # priority_only | dependency_only | priority_dependency
      max_workers: 3
      check_interval_seconds: 30
  worker:
    model: 'sonnet'
    coding:
      language: 'typescript'
      test_framework: 'vitest'
      lint_command: 'npm run lint'
      test_command: 'npm test'
      build_command: 'npm run build'
    verification:
      run_tests: true
      run_lint: true
      run_build: true
      coverage_threshold: 80 # percentage (0-100)
  pr-reviewer:
    model: 'sonnet'
    review:
      auto_merge: false
      require_all_checks: true
      coverage_threshold: 80
      max_complexity: 10

# -----------------------------------------------------------------------------
# Quality Gates
# -----------------------------------------------------------------------------
# Enforce minimum quality standards at each phase of the pipeline.
quality_gates:
  # Document quality requirements
  document_quality:
    prd:
      required_sections:
        - 'Overview'
        - 'Goals and Objectives'
        - 'User Requirements'
        - 'Functional Requirements'
        - 'Non-Functional Requirements'
      min_requirements: 3
    srs:
      required_sections:
        - 'Introduction'
        - 'System Overview'
        - 'Functional Requirements'
        - 'Non-Functional Requirements'
      min_features: 2
      min_use_cases_per_feature: 1
    sds:
      required_sections:
        - 'System Architecture'
        - 'Component Design'
        - 'Interface Design'
      min_components: 2

  # Code quality thresholds
  code_quality:
    coverage_threshold: 70 # minimum test coverage %
    max_complexity: 15 # max cyclomatic complexity
    max_line_length: 100
    no_todos_in_code: false # allow TODOs during development
    no_console_logs: true # disallow console.log in production code

  # Security checks
  security:
    no_hardcoded_secrets: true
    require_input_validation: true
    require_authentication: true

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
# Runtime execution settings for the pipeline orchestrator.
execution:
  max_parallel_workers: 3 # max workers for parallel stages
  retry_attempts: 3
  retry_delay_ms: 5000

# -----------------------------------------------------------------------------
# GitHub Integration
# -----------------------------------------------------------------------------
# Configure GitHub repo settings for issue/PR management.
# Set local_mode to true (or use --local flag) to skip GitHub integration.
#
# local_mode: false                # set to true to disable GitHub integration
github:
  repo: 'owner/repo' # GitHub repository (owner/repo format)
  default_branch: 'main'
  issue_labels:
    - 'ad-sdlc'
    - 'automated'
  pr_labels:
    - 'ad-sdlc'
  # milestone_prefix: "Sprint"    # prefix for auto-created milestones

# -----------------------------------------------------------------------------
# Scratchpad Backend
# -----------------------------------------------------------------------------
# Storage backend for inter-agent communication.
# Options: file (default), sqlite, redis
scratchpad:
  backend: 'file'
  file:
    base_path: '.ad-sdlc/scratchpad'
    format: 'yaml' # yaml | json | raw

  # --- SQLite backend (alternative) ---
  # sqlite:
  #   db_path: ".ad-sdlc/scratchpad.db"
  #   wal_mode: true
  #   busy_timeout: 5000

  # --- Redis backend (for team/distributed setups) ---
  # redis:
  #   host: "localhost"
  #   port: 6379
  #   db: 0
  #   prefix: "ad-sdlc:"
  #   ttl: 86400                   # 24 hours
  #   connect_timeout: 5000
  #   max_retries: 3

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: 'INFO' # DEBUG | INFO | WARN | ERROR
  format: 'json' # json | text
  output:
    - type: 'file'
      path: '.ad-sdlc/logs/pipeline.log'
      rotate: true
      max_size: '10MB'
      max_files: 5
      format: 'json'
    - type: 'console'
      format: 'pretty'

