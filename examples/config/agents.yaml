# =============================================================================
# AD-SDLC Agents Configuration
# =============================================================================
#
# Defines all agents in the AD-SDLC pipeline, their roles, capabilities,
# model preferences, and relationships.
# Place this file at: .ad-sdlc/config/agents.yaml
#
# Schema: schemas/agents.schema.json
# Generated by: ad-sdlc init --quick (standard template)
# =============================================================================

# Configuration schema version (semver format, required)
version: '1.0.0'

# -----------------------------------------------------------------------------
# Agent Definitions
# -----------------------------------------------------------------------------
# Each key is the agent's unique identifier used in pipeline stage references.
# Required fields per agent: id, name
agents:
  # ---------------------------------------------------------------------------
  # Collector - Gathers and organizes project requirements
  # ---------------------------------------------------------------------------
  collector:
    id: 'collector'
    name: 'Collector Agent'
    description: 'Collects and organizes project requirements from user input'
    definition_file: '.claude/agents/collector.md'
    category: 'document_pipeline'
    order: 1
    model_preference: 'sonnet'
    capabilities:
      - 'requirement_gathering'
      - 'information_organization'
      - 'clarification_questions'
    io:
      inputs:
        - 'user_requirements' # raw user input
      outputs:
        - 'scratchpad/info/*/collected_info.yaml'

  # ---------------------------------------------------------------------------
  # PRD Writer - Generates Product Requirements Document
  # ---------------------------------------------------------------------------
  prd-writer:
    id: 'prd-writer'
    name: 'PRD Writer Agent'
    description: 'Generates Product Requirements Document from collected info'
    definition_file: '.claude/agents/prd-writer.md'
    category: 'document_pipeline'
    order: 2
    model_preference: 'sonnet'
    capabilities:
      - 'document_generation'
      - 'requirement_analysis'
    io:
      inputs:
        - 'scratchpad/info/*/collected_info.yaml'
      outputs:
        - 'docs/prd/*.md'

  # ---------------------------------------------------------------------------
  # SRS Writer - Generates Software Requirements Specification
  # ---------------------------------------------------------------------------
  srs-writer:
    id: 'srs-writer'
    name: 'SRS Writer Agent'
    description: 'Generates Software Requirements Specification from PRD'
    definition_file: '.claude/agents/srs-writer.md'
    category: 'document_pipeline'
    order: 3
    model_preference: 'sonnet'
    capabilities:
      - 'document_generation'
      - 'technical_specification'
    io:
      inputs:
        - 'docs/prd/*.md'
      outputs:
        - 'docs/srs/*.md'

  # ---------------------------------------------------------------------------
  # SDS Writer - Generates Software Design Specification
  # ---------------------------------------------------------------------------
  sds-writer:
    id: 'sds-writer'
    name: 'SDS Writer Agent'
    description: 'Generates Software Design Specification from SRS'
    definition_file: '.claude/agents/sds-writer.md'
    category: 'document_pipeline'
    order: 4
    model_preference: 'sonnet'
    capabilities:
      - 'document_generation'
      - 'architecture_design'
      - 'component_design'
    io:
      inputs:
        - 'docs/srs/*.md'
      outputs:
        - 'docs/sds/*.md'

  # ---------------------------------------------------------------------------
  # Issue Generator - Creates GitHub issues from SDS
  # ---------------------------------------------------------------------------
  issue-generator:
    id: 'issue-generator'
    name: 'Issue Generator Agent'
    description: 'Generates GitHub issues from Software Design Specification'
    definition_file: '.claude/agents/issue-generator.md'
    category: 'issue_management'
    order: 5
    model_preference: 'sonnet'
    capabilities:
      - 'issue_creation'
      - 'dependency_analysis'
      - 'priority_assignment'
    io:
      inputs:
        - 'docs/sds/*.md'
      outputs:
        - 'scratchpad/issues/*/*.yaml'
    # metrics:
    #   avg_issues_per_project: 15

  # ---------------------------------------------------------------------------
  # Controller - Orchestrates parallel implementation
  # ---------------------------------------------------------------------------
  controller:
    id: 'controller'
    name: 'Controller Agent'
    description: 'Orchestrates parallel implementation by assigning work to workers'
    definition_file: '.claude/agents/controller.md'
    category: 'orchestration'
    order: 6
    model_preference: 'sonnet'
    capabilities:
      - 'task_scheduling'
      - 'progress_monitoring'
      - 'failure_handling'
      - 'worker_coordination'
    io:
      inputs:
        - 'scratchpad/issues/*/*.yaml'
      outputs:
        - 'scratchpad/progress/*/*.yaml'

  # ---------------------------------------------------------------------------
  # Worker - Implements individual issues
  # ---------------------------------------------------------------------------
  worker:
    id: 'worker'
    name: 'Worker Agent'
    description: 'Implements individual issues assigned by the controller'
    definition_file: '.claude/agents/worker.md'
    category: 'execution'
    order: 7
    model_preference: 'sonnet'
    parallelizable: true # can run multiple instances
    max_instances: 5 # up to 5 concurrent workers
    capabilities:
      - 'code_implementation'
      - 'test_writing'
      - 'pull_request_creation'
    io:
      inputs:
        - 'scratchpad/progress/*/*.yaml'
      outputs:
        - 'pull_requests'

  # ---------------------------------------------------------------------------
  # PR Reviewer - Reviews pull requests
  # ---------------------------------------------------------------------------
  pr-reviewer:
    id: 'pr-reviewer'
    name: 'PR Reviewer Agent'
    description: 'Reviews pull requests for quality, correctness, and standards'
    definition_file: '.claude/agents/pr-reviewer.md'
    category: 'execution'
    order: 8
    model_preference: 'sonnet'
    capabilities:
      - 'code_review'
      - 'quality_assessment'
      - 'security_review'
    io:
      inputs:
        - 'pull_requests'
      outputs:
        - 'review_comments'

# -----------------------------------------------------------------------------
# Agent Categories
# -----------------------------------------------------------------------------
# Group agents by their role in the pipeline for easier management.
categories:
  document_pipeline:
    name: 'Document Pipeline'
    description: 'Agents that generate project documentation (PRD, SRS, SDS)'
    agents:
      - 'collector'
      - 'prd-writer'
      - 'srs-writer'
      - 'sds-writer'
    execution_mode: 'sequential' # sequential | parallel | on_demand | mixed

  issue_management:
    name: 'Issue Management'
    description: 'Agents that create and manage GitHub issues'
    agents:
      - 'issue-generator'
    execution_mode: 'sequential'

  orchestration:
    name: 'Orchestration'
    description: 'Agents that coordinate and schedule work'
    agents:
      - 'controller'
    execution_mode: 'on_demand'

  execution:
    name: 'Execution'
    description: 'Agents that implement code and review pull requests'
    agents:
      - 'worker'
      - 'pr-reviewer'
    execution_mode: 'mixed' # workers run in parallel, reviewer sequential

# -----------------------------------------------------------------------------
# Agent Relationships
# -----------------------------------------------------------------------------
# Define dependencies and data flow between agents.
relationships:
  dependencies:
    prd-writer:
      requires:
        - 'collector'
    srs-writer:
      requires:
        - 'prd-writer'
    sds-writer:
      requires:
        - 'srs-writer'
    issue-generator:
      requires:
        - 'sds-writer'
    controller:
      requires:
        - 'issue-generator'
      orchestrates:
        - 'worker'
    worker:
      requires:
        - 'controller'
    pr-reviewer:
      requires:
        - 'worker'

  # Data flow shows what files/data pass between agents
  data_flow:
    - from: 'collector'
      to: 'prd-writer'
      data: 'scratchpad/info/*/collected_info.yaml'
    - from: 'prd-writer'
      to: 'srs-writer'
      data: 'docs/prd/*.md'
    - from: 'srs-writer'
      to: 'sds-writer'
      data: 'docs/srs/*.md'
    - from: 'sds-writer'
      to: 'issue-generator'
      data: 'docs/sds/*.md'
    - from: 'issue-generator'
      to: 'controller'
      data: 'scratchpad/issues/*/*.yaml'
    - from: 'controller'
      to: 'worker'
      data: 'scratchpad/progress/*/*.yaml'

# -----------------------------------------------------------------------------
# Model Definitions (optional)
# -----------------------------------------------------------------------------
# Define available Claude models and their characteristics.
# This helps with token budget planning and agent assignment.
models:
  sonnet:
    id: 'claude-sonnet-4-6'
    context_window: 200000
    max_output: 16000
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    best_for:
      - 'general_tasks'
      - 'code_generation'
      - 'document_writing'
  opus:
    id: 'claude-opus-4-6'
    context_window: 200000
    max_output: 16000
    cost_per_1k_input: 0.015
    cost_per_1k_output: 0.075
    best_for:
      - 'complex_reasoning'
      - 'architecture_design'
      - 'code_review'
  haiku:
    id: 'claude-haiku-4-5-20251001'
    context_window: 200000
    max_output: 8000
    cost_per_1k_input: 0.001
    cost_per_1k_output: 0.005
    best_for:
      - 'simple_tasks'
      - 'classification'
      - 'quick_lookups'
