# ──────────────────────────────────────────────
# file_routes — Direct file lookups by name pattern
# ──────────────────────────────────────────────
file_routes:
  ADR:
    pattern: 'ADR-{NNN}'
    locations:
      - docs/adr/ADR-{NNN}-*.md
      - docs/architecture/decisions/ADR-{NNN}-*.md

  PRD:
    pattern: 'PRD-{NNN}'
    location: docs/PRD-{NNN}-*.md

  SRS:
    pattern: 'SRS-{NNN}'
    location: docs/SRS-{NNN}-*.md

  SDS:
    pattern: 'SDS-{NNN}'
    location: docs/SDS-{NNN}-*.md

  agent_definition:
    pattern: '{agent-name}'
    location: .claude/agents/{agent-name}.md

  agent_reference:
    pattern: '{agent-name}'
    locations:
      - docs/reference/agents/{agent-name}.md
      - docs/reference/agents/ko/{agent-name}.md

  reference_series:
    pattern: '{NN}'
    location: docs/reference/{NN}_*.md

  source_module:
    pattern: '{module-name}'
    location: src/{module-name}/README.md

# ──────────────────────────────────────────────
# skip — Directories to skip when searching
# ──────────────────────────────────────────────
skip:
  - node_modules/*
  - docs/api/* # 897 TypeDoc files — use api-docs bundle or search directly
  - .ad-sdlc/logs/*
  - .ad-sdlc/config/*
  - docs/.index/*

# ──────────────────────────────────────────────
# language_routes — Find the right translation
# ──────────────────────────────────────────────
language_routes:
  korean:
    suffix: '.kr.md'
    directories:
      - docs/reference/agents/ko/
    note: 'Most EN docs have a .kr.md counterpart. Agent refs have a ko/ subdirectory.'
  english:
    suffix: '.md'
    note: 'Default. All documents have an English version.'
