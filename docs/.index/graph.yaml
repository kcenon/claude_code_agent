# ──────────────────────────────────────────────
# agent_pipeline — Agent execution order in SDLC
# ──────────────────────────────────────────────
agent_pipeline:
  greenfield:
    - { agent: project-initializer, next: collector }
    - { agent: collector, next: prd-writer }
    - { agent: prd-writer, next: srs-writer }
    - { agent: srs-writer, next: sds-writer }
    - { agent: sds-writer, next: issue-generator }
    - { agent: issue-generator, next: controller }
    - { agent: controller, next: worker }
    - { agent: worker, next: pr-reviewer }
    - { agent: pr-reviewer, next: ci-fixer }

  enhancement:
    - { agent: mode-detector, next: analysis-orchestrator }
    - { agent: analysis-orchestrator, uses: [document-reader, codebase-analyzer, impact-analyzer] }
    - { agent: impact-analyzer, next: issue-generator }
    - { agent: issue-generator, next: controller }
    - { agent: controller, next: worker }
    - { agent: worker, next: regression-tester }
    - { agent: regression-tester, next: pr-reviewer }
